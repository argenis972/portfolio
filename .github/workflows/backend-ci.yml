name: 🧪 Backend CI

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**', 'hotfix/**', 'feature/**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop, 'feat/**', 'fix/**', 'hotfix/**', 'feature/**']
    paths:
      - 'backend/**'

jobs:
  test:
    name: 🐍 Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: 📥 Code checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: 📦 Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🧪 Run tests
        run: |
          cd backend
          pytest --cov=app --cov-config=.coveragerc --cov-report=xml --cov-report=term

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: ✅ Verify minimum coverage
        run: |
          cd backend
          pytest --cov=app --cov-config=.coveragerc --cov-fail-under=80

  lint:
    name: 🧹 Linting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: 📦 Install linting dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 🧹 Run ruff (lint + format)
        run: |
          cd backend
          ruff --version
          ruff check .
          ruff format --check . || (ruff format --diff . && exit 1)

      - name: 🛡️ Run mypy (gradual typing)
        run: |
          cd backend
          # Gradual: core + use cases + controllers + adapters
          mypy app/core app/use_cases app/controllers app/adapters \
            --ignore-missing-imports --explicit-package-bases

      - name: 🔒 Check hardcoded placeholders
        run: |
          if grep -qrn --exclude-dir=".github" "https://seudominio.com" .; then
            echo "❌ ERROR: Placeholder 'https://seudominio.com' found. Use environment variables."
            exit 1
          fi

  build:
    name: 🏗️ Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: 📥 Code checkout
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: |
          docker build -t portafolio-api:${{ github.sha }} -f backend/Dockerfile .
