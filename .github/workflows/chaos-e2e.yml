name: Chaos E2E

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Monday 6am — weekly verification

jobs:
  chaos-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run backend locally (docker-compose)
        run: |
          docker-compose up -d --build
        env:
          ENVIRONMENT: "testing"
          # Simulated secrets for local docker-compose
          SENTRY_DSN: "dummy-dsn"
          REDIS_URL: "redis://redis:6379/0"

      - name: Wait for health
        run: |
          echo "Waiting for API to be ready..."
          # The API might be degraded (200) or healthy (200) depending on timing. Wait for 200.
          timeout 60 bash -c 'while [[ "$(curl -s -o /dev/null -w "%{http_code}" localhost:8000/health)" != "200" ]]; do sleep 2; done' || false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx

      - name: Run chaos E2E suite
        working-directory: ./backend
        env:
          BASE_URL: "http://localhost:8000"
        run: |
          pytest tests/e2e/ -v
