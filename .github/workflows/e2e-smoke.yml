name: 🎭 E2E Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e-smoke.yml'
  # Run manually from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL (default: production)'
        required: false
        default: 'https://argenisbackend.com'

jobs:
  e2e:
    name: 🎭 Chaos Playwright Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Code checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd frontend
          npm ci

      - name: 🎭 Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: 🚀 Run E2E smoke tests
        run: |
          cd frontend
          npm run e2e
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://argenisbackend.com' }}

      - name: 📊 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
