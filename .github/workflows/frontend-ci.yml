name: ⚛️ Frontend CI

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop, 'feature/**']
    paths:
      - 'frontend/**'

jobs:
  test:
    name: 🧪 React Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: 📥 Code checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd frontend
          npm ci

      - name: 🧪 Run tests
        run: |
          cd frontend
          npm run test

      - name: 🏗️ Production build
        run: |
          cd frontend
          npm run build

  lint:
    name: 🧹 Linting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd frontend
          npm ci

      - name: 🔍 ESLint
        run: |
          cd frontend
          npm run lint

      - name: 🔒 TypeScript type-check
        run: |
          cd frontend
          npx tsc -b

      - name: 🔒 Check hardcoded placeholders
        run: |
          cd ..
          if grep -qrn --exclude-dir=".github" "https://seudominio.com" .; then
            echo "❌ ERROR: Placeholder 'https://seudominio.com' found. Use environment variables."
            exit 1
          fi

      - name: 🔒 Preflight VITE_API_URL contract
        run: |
          echo "✅ Preflight: VITE_API_URL debe incluir /api/v1 (se configura en Vercel Dashboard)"
          echo "   El código normaliza automáticamente, pero el valor exacto evita warnings en consola."
          if grep -qrn "VITE_API_URL=" frontend/.env.example --include="*.example"; then
            echo "   ✅ .env.example contiene el valor correcto con /api/v1"
          fi
