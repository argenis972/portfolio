name: 🏗️ Infrastructure CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'

jobs:
  terraform:
    name: 🌍 Terraform
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: 🔍 Terraform Init
        run: terraform init -upgrade

      - name: 🎨 Terraform Format Check
        run: terraform fmt -check

      - name: 📋 Terraform Plan
        id: plan
        run: terraform plan -no-color
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_redis_url: ${{ secrets.REDIS_URL }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_metrics_basic_auth_username: ${{ secrets.METRICS_BASIC_AUTH_USERNAME }}
          TF_VAR_metrics_basic_auth_password: ${{ secrets.METRICS_BASIC_AUTH_PASSWORD }}
          TF_VAR_ambiente: ${{ secrets.AMBIENTE }}
          TF_VAR_api_host: ${{ secrets.API_HOST }}
          TF_VAR_api_port: ${{ secrets.API_PORT }}
          TF_VAR_nome_app: ${{ secrets.NOME_APP }}
          TF_VAR_origens_permitidas: ${{ secrets.ORIGENS_PERMITIDAS }}
          TF_VAR_regex_origens_permitidas: ${{ secrets.REGEX_ORIGENS_PERMITIDAS }}
          TF_VAR_otlp_endpoint: ${{ secrets.OTLP_ENDPOINT }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}
          TF_VAR_resend_to_email: ${{ secrets.RESEND_TO_EMAIL }}
          TF_VAR_trusted_proxy_depth: ${{ secrets.TRUSTED_PROXY_DEPTH }}

      - name: 🚀 Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_redis_url: ${{ secrets.REDIS_URL }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_metrics_basic_auth_username: ${{ secrets.METRICS_BASIC_AUTH_USERNAME }}
          TF_VAR_metrics_basic_auth_password: ${{ secrets.METRICS_BASIC_AUTH_PASSWORD }}
          TF_VAR_ambiente: ${{ secrets.AMBIENTE }}
          TF_VAR_api_host: ${{ secrets.API_HOST }}
          TF_VAR_api_port: ${{ secrets.API_PORT }}
          TF_VAR_nome_app: ${{ secrets.NOME_APP }}
          TF_VAR_origens_permitidas: ${{ secrets.ORIGENS_PERMITIDAS }}
          TF_VAR_regex_origens_permitidas: ${{ secrets.REGEX_ORIGENS_PERMITIDAS }}
          TF_VAR_otlp_endpoint: ${{ secrets.OTLP_ENDPOINT }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}
          TF_VAR_resend_to_email: ${{ secrets.RESEND_TO_EMAIL }}
          TF_VAR_trusted_proxy_depth: ${{ secrets.TRUSTED_PROXY_DEPTH }}
