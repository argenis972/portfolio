name: 🏗️ Infrastructure CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'

jobs:
  terraform:
    name: 🌍 Terraform
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: 🔍 Terraform Init
        run: terraform init

      - name: 🎨 Terraform Format Check
        run: terraform fmt -check

      - name: 📋 Terraform Plan
        id: plan
        run: terraform plan -no-color
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_redis_url: ${{ secrets.REDIS_URL }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_metrics_basic_auth_username: ${{ secrets.METRICS_BASIC_AUTH_USERNAME }}
          TF_VAR_metrics_basic_auth_password: ${{ secrets.METRICS_BASIC_AUTH_PASSWORD }}

      - name: 🚀 Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -no-color
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_redis_url: ${{ secrets.REDIS_URL }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN }}
          TF_VAR_metrics_basic_auth_username: ${{ secrets.METRICS_BASIC_AUTH_USERNAME }}
          TF_VAR_metrics_basic_auth_password: ${{ secrets.METRICS_BASIC_AUTH_PASSWORD }}
