
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
markers =
    async_with_redis: Mark test as needing redis (mocked).
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
