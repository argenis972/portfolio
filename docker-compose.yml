# ============================================
# DOCKER COMPOSE - FULL-STACK PORTFOLIO
# ============================================
#
# This file is a MINIMAL STRUCTURE for future development
# Uncomment and configure as needed
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose logs -f api    # View backend logs
# ============================================

version: '3.8'

services:
  # ===========================
  # BACKEND API (FastAPI)
  # ===========================
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: portafolio-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-portafolio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-portafolio_db}
      - REDIS_URL=redis://redis:6379/0
    # volumes:
      # - ./backend:/app  # Commented for production (security) - Uncomment for development
      # - /app/.venv  # Excludes virtualenv from volume
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portafolio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/saude"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================
  # FRONTEND (React + Vite)
  # ===========================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: portafolio-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     - VITE_API_URL=http://api:8000/api/v1
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   depends_on:
  #     - api
  #   networks:
  #     - portafolio-network

  # ===========================
  # DATABASE (PostgreSQL)
  # ===========================
  db:
    image: postgres:16-alpine
    container_name: portafolio-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-portafolio}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-portafolio_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portafolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portafolio -d portafolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # CACHE (Redis)
  # ===========================
  redis:
    image: redis:7-alpine
    container_name: portafolio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - portafolio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # REVERSE PROXY (Nginx)
  # ===========================
  # nginx:
  #   image: nginx:alpine
  #   container_name: portafolio-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - api
  #     - frontend
  #   networks:
  #     - portafolio-network

  # =============================================================
  # OBSERVABILITY (Tier 1 — enable for local development)
  # =============================================================
  # To run the complete monitoring stack:
  #   docker-compose up -d api prometheus grafana jaeger
  # Access at:
  #   Grafana:    http://localhost:3000  (admin/admin)
  #   Prometheus: http://localhost:9090
  #   Jaeger UI:  http://localhost:16686
  # =============================================================

  # --- Prometheus (collects metrics from API /metrics) ---
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: portafolio-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - api
    networks:
      - portafolio-network

  # --- Grafana (dashboard visualization) ---
  grafana:
    image: grafana/grafana:11.1.0
    container_name: portafolio-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - portafolio-network

  # --- Jaeger (distributed tracing — receives OpenTelemetry spans) ---
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: portafolio-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - portafolio-network

# ===========================
# PERSISTENT VOLUMES
# ===========================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ===========================
# NETWORKS
# ===========================
networks:
  portafolio-network:
    driver: bridge
