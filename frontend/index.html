<!doctype html>
<html lang="en" prefix="og: https://ogp.me/ns#">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preconnects -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link rel="preconnect" href="https://api.argenisbackend.com">

  <!-- Preload Critical Assets (LCP Enhancement) -->
  <link rel="preload" as="image" href="/profile.webp" type="image/webp" fetchpriority="high" />

  <!-- Prevent Flash of Light Mode (FOUC) and Critical CSS -->
  <style>
    :root {
      color-scheme: light;
      --theme-bg: #F3ECE2;
      --theme-text: #18120E;
      --theme-surface: #FFF9F2;
      --theme-border: #D2C1AD;
      --theme-primary: #9F6128;
      --theme-primary-text: #FFFFFF;
    }
    .dark {
      color-scheme: dark;
      --theme-bg: #161412;
      --theme-text: #EAE6E1;
      --theme-surface: #221E1A;
      --theme-border: #36302A;
      --theme-primary: #D4A373;
      --theme-primary-text: #161412;
    }
    html, body {
      background-color: var(--theme-bg);
      color: var(--theme-text);
      margin: 0;
      padding: 0;
    }
  </style>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('portfolio_theme');
        var theme = 'dark';
        if (saved === 'light' || saved === 'dark') {
          theme = saved;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      } catch (e) { }
    })();
  </script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="preload" as="style">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- SEO Meta Tags -->
  <title>Argenis Lopez | Backend Systems & Resilience Engineering</title>
  <meta name="description"
    content="Documenting system resilience through documented failures. Professional backend portfolio of Argenis Lopez, specializing in Python, FastAPI, and production operations." />
  <link rel="canonical" href="https://argenisbackend.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://argenisbackend.com/" />
  <meta property="og:title" content="Argenis Lopez | Backend Systems & Resilience Engineering" />
  <meta property="og:description"
    content="Exploring high-performance backend systems through the lens of failure and recovery." />
  <meta property="og:image" content="https://argenisbackend.com/profile.jpg" />
  <meta property="og:image:secure_url" content="https://argenisbackend.com/profile.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="1200" />
  <meta property="og:site_name" content="Argenis Lopez Portfolio" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://argenisbackend.com/" />
  <meta name="twitter:title" content="Argenis Lopez | Backend Systems & Resilience Engineering" />
  <meta name="twitter:description"
    content="Exploring high-performance backend systems through the lens of failure and recovery." />
  <meta name="twitter:image" content="https://argenisbackend.com/profile.jpg" />

  <meta name="theme-color" content="#161412" />

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
