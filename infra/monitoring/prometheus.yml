global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alert.rules.yml'


scrape_configs:
  # -------------------------------------------------------
  # Backend API (FastAPI running on Koyeb / locally)
  # In local development: api:8000 (via docker-compose)
  # In production: replace with Koyeb URL or use Pushgateway
  # -------------------------------------------------------
  - job_name: 'portafolio-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 10s
